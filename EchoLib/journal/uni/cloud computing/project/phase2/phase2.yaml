openapi: 3.1.0
info:
  title: "CC2526 Group8 API"
  description: A platform offering a unified movie catalog, public review system, personal watchlists, and personalized recommendations.
  version: "1.0.0"

servers:
  - url: /api

tags:
  - name: User Registration
  - name: User Authentication
  - name: Movies
  - name: Review System

components:
  schemas:
    User:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string

    UserDetails:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        gender:
          type: string
          enum: [M, F, NB, O]
        age:
          type: integer

    UserRegistration:
      type: object
      required: 
        - email
        - password
        - username
        - termsAccepted
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 10
          pattern: "^(?=.*\\d).{10,}$"
        username:
          type: string
        gender:
          type: string
          enum: [M, F, NB, O]
        age:
          type: integer
        termsAccepted:
          type: boolean
          
    Movie:
      type: object
      title: Movie
      required:
        - movie_id
        - movie_title
        - release_year
      properties:
        movie_id:
          type: string
          title: Movie ID
        movie_title:
          type: string
          title: Movie Title
          examples:
            - "Inception"
        genres:
          type: array
          title: Genres
          items:
            type: string
          examples: ["Action", "Sci-Fi", "Thriller"]
        description:
          type: string
          title: Description
          examples:
            - "A thief who steals corporate secrets through dream-sharing technology."
        imdb_url:
          type: string
          format: uri
          title: IMDB URL
          examples: ["https://www.imdb.com/title/tt1375666/"]
        release_year:
          type: integer
          minimum: 1888
          title: Release Year
        tags:
          type: array
          title: Tags
          items:
            type: string
          examples: ["mind-bending", "dreams", "heist"]

    MovieCreate:
      type: object
      title: MovieCreate
      required:
        - movie_title
        - release_year
      properties:
        movie_title:
          type: string
          title: Movie Title
          examples: ["Inception"]
        genres:
          type: array
          title: Genres
          items:
            type: string
          examples: ["Action", "Sci-Fi", "Thriller"]
        description:
          type: string
          title: Description
          examples:
            - "A thief who steals corporate secrets through dream-sharing technology."
        imdb_url:
          type: string
          format: uri
          title: IMDB URL
          examples: ["https://www.imdb.com/title/tt1375666/"]
        release_year:
          type: integer
          minimum: 1888
          title: Release Year
        tags:
          type: array
          title: Tags
          items:
            type: string
          examples: ["mind-bending", "dreams", "heist"]

    MovieUpdate:
      type: object
      title: MovieUpdate
      description: All fields are optional. Only provided fields will be updated.
      properties:
        movie_title:
          type: string
          title: Movie Title
        genres:
          type: array
          title: Genres
          items:
            type: string
          examples: ["Action", "Sci-Fi", "Thriller"]
        description:
          type: string
          title: Description
          examples:
            - "A thief who steals corporate secrets through dream-sharing technology."
        imdb_url:
          type: string
          format: uri
          title: IMDB URL
        release_year:
          type: integer
          minimum: 1888
          title: Release Year
        tags:
          type: array
          title: Tags
          items:
            type: string
          examples: ["mind-bending", "dreams", "heist"]

    HTTPValidationError:
      type: object
      title: HTTPValidationError
      properties:
        detail:
          type: array
          title: Detail
          items:
            $ref: "#/components/schemas/ValidationError"

    ValidationError:
      type: object
      title: ValidationError
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          title: Location
          items:
            anyOf:
              - type: string
              - type: integer
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
          
    Rating:
      type: object
      required: 
        - rating_id
        - rating
        - user_id
        - movie_id
      properties:
        rating_id:
          type: integer
        user_id:
          type: string
        movie_id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        review:
          type: string
        timestamp:
          type: string
          format: date-time
        tag:
          type: string

    CreateRating:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        review:
          type: string
        tag:
          type: string

    UpdateRating:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        review:
          type: string
        tag:
          type: string

  parameters:
    user_id:
      name: user_id
      in: path
      required: true
      schema:
        type: string

    genre:
      name: genre
      in: query
      required: false
      description: Filter by genre
      schema:
        type: string

    release_year:
      name: release_year
      in: query
      required: false
      description: Filter by release year
      schema:
        type: integer
        minimum: 1888
    
    tag:
      name: tag
      in: query
      required: false
      description: Filter by a specific tag
      schema:
        type: integer
    
    rating_id:
      name: rating_id
      in: path
      required: true
      schema:
        type: integer

    movie_id:
      name: movie_id
      in: path
      required: true
      schema:
        type: integer

    username_filter:
      name: username
      in: query
      schema:
        type: string

    movie_filter:
      name: movie
      in: query
      schema:
        type: string

    rating_filter:
      name: rating
      in: query
      schema:
        type: integer

    filter_by_year:
      name: year
      in: query
      schema:
        type: integer

    tag_filter:
      name: tag
      in: query
      schema:
        type: string

paths:
  /users:
    get:
      summary: Retrieve all users
      tags: 
        - "User Registration"
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      summary: Register a new user
      tags: 
        - "User Registration"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistration"
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Invalid input

  /users/{user_id}:
    get:
      summary: Retrieve user details
      tags: 
        - "User Registration"
      parameters:
        - $ref: "#/components/parameters/user_id"
      responses:
        '200':
          description: User details retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetails"

    put:
      summary: Update user details
      tags: 
        - "User Registration"
      parameters:
        - $ref: "#/components/parameters/user_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserDetails"
      responses:
        '200':
          description: User updated successfully

    delete:
      summary: Delete a user
      tags: 
        - "User Registration"
      parameters:
        - $ref: "#/components/parameters/user_id"
      responses:
        '204':
          description: User deleted successfully

  /auth:
    post:
      summary: Authenticate user
      tags: 
        - "User Authentication"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Invalid credentials

  /auth/logout:
    post:
      summary: Logout user (invalidate token)
      tags:
        - "User Authentication"
      responses:
        '200':
          description: Token invalidated

  /auth/verify:
    get:
      summary: Verify token validity
      tags: 
        - "User Authentication"
      responses:
        '200':
          description: Token is valid
        '401':
          description: Invalid or expired token

  /ratings:
    get:
      summary: Retrieve all ratings
      tags:
        - "Review System"
      parameters:
        - $ref: "#/components/parameters/username_filter"
        - $ref: "#/components/parameters/movie_filter"
        - $ref: "#/components/parameters/rating_filter"
        - $ref: "#/components/parameters/filter_by_year"
        - $ref: "#/components/parameters/tag_filter"
      responses:
        '200':
          description: Ratings retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"

  /ratings/{rating_id}:
    get:
      summary: Retrieve rating by ID
      tags: 
        - "Review System"
      parameters:
        - $ref: "#/components/parameters/rating_id"
      responses:
        '200':
          description: Rating retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"

    put:
      summary: Update rating
      tags: 
        - "Review System"
      parameters:
        - $ref: "#/components/parameters/rating_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRating"
      responses:
        '200':
          description: Rating updated

    delete:
      summary: Delete rating
      tags: 
        - "Review System"
      parameters:
        - $ref: "#/components/parameters/rating_id"
      responses:
        '204':
          description: Rating deleted

  /movies/{movie_id}/ratings:
    get:
      summary: Retrieve ratings for a movie
      tags: 
        - "Review System"
      parameters:
        - $ref: "#/components/parameters/movie_id"
        - $ref: "#/components/parameters/rating_filter"
        - $ref: "#/components/parameters/filter_by_year"
        - $ref: "#/components/parameters/tag_filter"
      responses:
        '200':
          description: Movie ratings retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"

    post:
      summary: Create a rating for a movie
      tags: 
        - "Review System"
      parameters:
        - $ref: "#/components/parameters/movie_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRating"
      responses:
        '201':
          description: Rating created

  /users/{user_id}/ratings:
    get:
      summary: Retrieve ratings by a user
      tags: 
        - "Review System"
      parameters:
        - $ref: "#/components/parameters/user_id"
        - $ref: "#/components/parameters/rating_filter"
        - $ref: "#/components/parameters/filter_by_year"
        - $ref: "#/components/parameters/tag_filter"
      responses:
        '200':
          description: User ratings retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"