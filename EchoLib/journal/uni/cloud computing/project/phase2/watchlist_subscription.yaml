openapi: 3.1.0
info:
  title: "CC2526 Group8 - Watchlist and Subscription API"
  description: >
    Description
  version: "1.0.0"
servers:
  - url: "/api"

components:
  schemas:

    Watchlist:
      type: object
      properties:
        watchlist_id:
          type: integer
        user_id:
          type: string
        title:
          type: string
          examples:
            - "My Favourites"
        created_at:
          type: string
          format: date-time

    WatchlistCreate:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          examples:
            - "My Favourites"

    WatchlistUpdate:
      type: object
      description: All fields are optional. Only provided fields will be updated.
      properties:
        title:
          type: string
          examples:
            - "Updated Title"

    Subscription:
      type: object
      properties:
        subscription_id:
          type: integer
        user_id:
          type: string
        type:
          type: string
          enum: [free, basic, premium]
          examples:
            - "premium"
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date

    SubscriptionCreate:
      type: object
      required:
        - user_id
        - type
        - start_date
        - end_date
      properties:
        user_id:
          type: string
        type:
          type: string
          enum: [free, basic, premium]
          examples:
            - "premium"
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date

    SubscriptionUpdate:
      type: object
      description: All fields are optional. Only provided fields will be updated.
      properties:
        type:
          type: string
          enum: [free, basic, premium]
        end_date:
          type: string
          format: date

    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"

    ValidationError:
      type: object
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          items:
            anyOf:
              - type: string
              - type: integer
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type

  parameters:
    user_id:
      name: user_id
      in: path
      required: true
      description: Unique identifier of the user
      schema:
        type: string
    watchlist_id:
      name: watchlist_id
      in: path
      required: true
      description: Unique identifier of the watchlist
      schema:
        type: integer
    subscription_id:
      name: subscription_id
      in: path
      required: true
      description: Unique identifier of the subscription
      schema:
        type: integer

paths:

  /watchlists:
    get:
      summary: List watchlists
      operationId: get_watchlists
      description: Retrieve all watchlists.
      tags:
        - Watchlist
      responses:
        '200':
          description: Watchlists retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Watchlist"
        '500':
          description: Internal server error

    post:
      summary: Create watchlist
      operationId: create_watchlist
      description: Create a new watchlist.
      tags:
        - Watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistCreate"
      responses:
        '201':
          description: Watchlist created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watchlist"
        '400':
          description: Invalid watchlist data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '401':
          description: Unauthorized
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

  /watchlists/{watchlist_id}:
    get:
      summary: Get watchlist
      operationId: get_watchlist
      description: Retrieve a single watchlist by its unique ID.
      tags:
        - Watchlist
      parameters:
        - $ref: "#/components/parameters/watchlist_id"
      responses:
        '200':
          description: Watchlist retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watchlist"
        '400':
          description: Invalid watchlist_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '404':
          description: Watchlist not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

    put:
      summary: Update watchlist
      operationId: update_watchlist
      description: Update one or more fields of an existing watchlist.
      tags:
        - Watchlist
      parameters:
        - $ref: "#/components/parameters/watchlist_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistUpdate"
      responses:
        '200':
          description: Watchlist updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watchlist"
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '404':
          description: Watchlist not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

    delete:
      summary: Delete watchlist
      operationId: delete_watchlist
      description: Permanently remove a watchlist.
      tags:
        - Watchlist
      parameters:
        - $ref: "#/components/parameters/watchlist_id"
      responses:
        '204':
          description: Watchlist deleted successfully
        '400':
          description: Invalid watchlist_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '404':
          description: Watchlist not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

  /users/{user_id}/watchlist:
    get:
      summary: List user watchlists
      operationId: get_user_watchlists
      description: Retrieve all watchlists belonging to a given user.
      tags:
        - Watchlist
      parameters:
        - $ref: "#/components/parameters/user_id"
      responses:
        '200':
          description: User watchlists retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Watchlist"
        '400':
          description: Invalid user_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '404':
          description: User not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

  /subscriptions:
    get:
      summary: List subscriptions
      operationId: get_subscriptions
      description: Retrieve all subscriptions.
      tags:
        - Subscription
      responses:
        '200':
          description: Subscriptions retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscription"
        '500':
          description: Internal server error

    post:
      summary: Create subscription
      operationId: create_subscription
      description: Create a new subscription.
      tags:
        - Subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionCreate"
      responses:
        '201':
          description: Subscription created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        '400':
          description: Invalid subscription data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '401':
          description: Unauthorized
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

  /subscriptions/{subscription_id}:
    get:
      summary: Get subscription
      operationId: get_subscription
      description: Retrieve a single subscription by its unique ID.
      tags:
        - Subscription
      parameters:
        - $ref: "#/components/parameters/subscription_id"
      responses:
        '200':
          description: Subscription retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        '400':
          description: Invalid subscription_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '404':
          description: Subscription not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

    put:
      summary: Update subscription
      operationId: update_subscription
      description: Update one or more fields of an existing subscription.
      tags:
        - Subscription
      parameters:
        - $ref: "#/components/parameters/subscription_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionUpdate"
      responses:
        '200':
          description: Subscription updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '404':
          description: Subscription not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error

    delete:
      summary: Delete subscription
      operationId: delete_subscription
      description: Cancel a subscription. Requires confirmation.
      tags:
        - Subscription
      parameters:
        - $ref: "#/components/parameters/subscription_id"
        - name: confirm
          in: query
          required: true
          description: Must be true to confirm cancellation
          schema:
            type: boolean
      responses:
        '204':
          description: Subscription cancelled successfully
        '400':
          description: Confirmation required to cancel subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '401':
          description: Unauthorized
        '404':
          description: Subscription not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        '500':
          description: Internal server error